schema_version = "1.0.0"

id = "lc_workflow_helper"
version = "0.2.1"
name = "LC Workflow helper"
tagline = "Workflow helpers for LC Blender production tasks"
maintainer = "Lubomir"
type = "add-on"

blender_version_min = "4.2.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

[permissions]
files = "Export CSV files and extension packages to disk"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".git/",
  "dist/",
  "scripts/",
  ".gitignore",
  "README.md",
]
